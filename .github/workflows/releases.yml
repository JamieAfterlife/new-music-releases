name: Check new music

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/configure-pages@v5
        id: pages
      - uses: actions/cache@v4
        with:
          path: |
            data/state.json
            data/videos.json
            data/video_review.json
          key: music-state-${{ github.run_id }}
          restore-keys: music-state-
      - uses: actions/cache@v4
        with:
          path: |
            data/lastfm_recent_artists.json
            data/lastfm_unresolved.json
            data/video_discovery.json
            data/video_channel_review.json
          key: music-recent-${{ github.run_id }}
          restore-keys: music-recent-
      - name: Prepare incremental update
        if: ${{ github.event_name == 'push' }}
        id: changes
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          mkdir -p "$RUNNER_TEMP/music-tracker"
          if git cat-file -e "${{ github.event.before }}:artists.json" 2>/dev/null; then
            git show "${{ github.event.before }}:artists.json" > "$RUNNER_TEMP/music-tracker/previous-artists.json"
          else
            echo '{"artists":[]}' > "$RUNNER_TEMP/music-tracker/previous-artists.json"
          fi
          changed_files="$(git diff --name-only "${{ github.event.before }}" HEAD)"
          sync_required=false
          full_scan_required=false
          while IFS= read -r changed_file; do
            case "$changed_file" in
              music_release_tracker.py|.github/workflows/releases.yml)
                sync_required=true
                full_scan_required=true
                ;;
              artists.json|blacklist.json|ratings.json) ;;
              "") ;;
              *) sync_required=true ;;
            esac
          done <<< "$changed_files"
          if [[ "$COMMIT_MESSAGE" == *"[quick rebuild]"* ]]; then
            full_scan_required=false
          fi
          echo "sync_required=$sync_required" >> "$GITHUB_OUTPUT"
          echo "full_scan_required=$full_scan_required" >> "$GITHUB_OUTPUT"
      - name: Sync optional Last.fm library
        if: ${{ github.event_name != 'push' || steps.changes.outputs.sync_required == 'true' }}
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python music_release_tracker.py sync-lastfm
      - name: Scan configured YouTube channels
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python youtube_video_tracker.py scan
      - name: Save imported artists
        run: |
          if ! git diff --quiet -- artists.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add artists.json
            git commit -m "Sync artists from Last.fm [skip ci]"
            git push
          fi
      - name: Find newly tracked artists
        if: ${{ github.event_name == 'push' }}
        id: artists
        run: |
          artist_mbids="$(python music_release_tracker.py changed-artists "$RUNNER_TEMP/music-tracker/previous-artists.json")"
          echo "mbids=$artist_mbids" >> "$GITHUB_OUTPUT"
      - name: Run scheduled or required full scan
        if: ${{ github.event_name != 'push' || steps.changes.outputs.full_scan_required == 'true' }}
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          MUSICBRAINZ_CONTACT: ${{ github.server_url }}/${{ github.repository }}
        run: python music_release_tracker.py check --notification-file new-releases.md
      - name: Scan newly tracked artists
        if: ${{ github.event_name == 'push' && steps.changes.outputs.full_scan_required != 'true' && steps.artists.outputs.mbids != '' }}
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          MUSICBRAINZ_CONTACT: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ "$(python music_release_tracker.py state-count)" -gt 0 ]; then
            python music_release_tracker.py check --artist-mbids "${{ steps.artists.outputs.mbids }}" --notification-file new-releases.md
          else
            echo "Saved release state is missing; running a safe recovery scan."
            python music_release_tracker.py check
          fi
      - name: Quickly rebuild saved releases, or recover safely
        if: ${{ github.event_name == 'push' && steps.changes.outputs.full_scan_required != 'true' && steps.artists.outputs.mbids == '' }}
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          MUSICBRAINZ_CONTACT: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ "$(python music_release_tracker.py state-count)" -gt 0 ]; then
            python music_release_tracker.py rebuild
          else
            echo "Saved release state is missing; running a safe recovery scan."
            python music_release_tracker.py check
          fi
      - name: Notify through GitHub
        if: ${{ hashFiles('new-releases.md') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue create --title "New music releases" --body-file new-releases.md
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - uses: actions/deploy-pages@v4
        id: deployment
