<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Music videos · __TITLE__</title>
  <style>
    :root{color-scheme:dark;--brand:#1db954;--black:#000;--panel:#121212;--raised:#1b1b1b;--line:#303030;--text:#f5f5f5;--muted:#a7a7a7}
    :root[data-theme="youtube"]{--brand:#ff304f;--black:#050000;--panel:#160d0f;--raised:#211114;--line:#402126}:root[data-theme="purple"]{--brand:#ad7aff;--black:#050307;--panel:#130f19;--raised:#1c1525;--line:#38284a}
    *{box-sizing:border-box}body{margin:0;background:var(--black);color:var(--text);font:15px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}.shell{max-width:1380px;margin:auto;padding:38px 28px 80px}.top{display:flex;justify-content:space-between;align-items:end;gap:24px;padding-bottom:22px;border-bottom:1px solid var(--line)}.eyebrow{margin:0 0 6px;color:var(--brand);font-size:.72rem;font-weight:850;letter-spacing:.16em;text-transform:uppercase}h1{margin:0;font-size:clamp(2.1rem,6vw,3.7rem);line-height:.95;letter-spacing:-.045em}.meta{margin:9px 0 0;color:var(--muted)}nav a{color:var(--brand);font-weight:750;text-decoration:none}.tools{display:flex;gap:10px;margin:22px 0}.tools input{width:min(100%,430px);padding:11px 14px;color:var(--text);background:#242424;border:1px solid #444;border-radius:5px;font:inherit;outline:none}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.video{overflow:hidden;background:var(--panel);border:1px solid var(--line);border-radius:9px}.thumb{display:block;aspect-ratio:16/9;background:#181818}.thumb img{width:100%;height:100%;object-fit:cover}.video__body{padding:15px}.video__date{display:block;color:var(--brand);font-size:.72rem;font-weight:800;letter-spacing:.08em}.video__title{display:block;margin-top:6px;color:var(--text);font-size:1.05rem;font-weight:800;line-height:1.25;text-decoration:none}.video__artist{margin-top:9px;font-weight:700}.video__channel{color:var(--muted);font-size:.82rem}.watch{display:inline-block;margin-top:13px;color:var(--brand);font-weight:800;text-decoration:none}.empty{padding:70px 20px;color:var(--muted);text-align:center;border:1px dashed #444;border-radius:8px}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:580px){.shell{padding:26px 13px 60px}.top{display:block}.top nav{margin-top:14px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body><main class="shell"><header class="top"><div><p class="eyebrow">Release radar</p><h1>Music videos</h1><p class="meta"><span id="count">__COUNT__</span> official video(s) from tracked channels</p></div><nav><a href="index.html">Releases</a> · <a href="history.html">History</a> · <a href="manage.html">Manage</a></nav></header><div class="tools"><input id="search" type="search" placeholder="Search videos, artists or channels" aria-label="Search videos"></div><div id="videos" class="grid">__VIDEOS__</div><div id="empty" class="empty" hidden>No music videos match that search.</div></main>
<script>
  const search=document.querySelector('#search'),cards=[...document.querySelectorAll('.video')],empty=document.querySelector('#empty'),count=document.querySelector('#count');
  try{const theme=localStorage.getItem('release-theme');if(theme&&theme!=='default')document.documentElement.dataset.theme=theme}catch{}
  function filter(){const query=search.value.trim().toLocaleLowerCase();let shown=0;for(const card of cards){const visible=!query||card.dataset.search.includes(query);card.hidden=!visible;if(visible)shown++}count.textContent=shown;empty.hidden=shown>0;if(!cards.length){empty.hidden=false;empty.textContent='No official music videos have been found yet. Add a YouTube channel in Manage, configure the API key, then run the tracker.'}}
  search.addEventListener('input',filter);filter();
</script></body></html>
